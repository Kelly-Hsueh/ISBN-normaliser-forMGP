name: ISBN Normalizer Bot

on:
  workflow_dispatch:
    inputs:
      max_edits:
        description: 'Maximum number of edits to perform (optional, leave empty for unlimited)'
        required: false
        default: ''
  schedule:
    - cron: '30 3 * * *'

jobs:
  normalize-isbn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run ISBN Normalizer Bot
        env:
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
        run: |
          ARGS="--template-title \"Template:ISBN\" --include-redirects true --bot-flag true"
          if [ -n "${{ github.event.inputs.max_edits }}" ]; then
            ARGS="$ARGS --max-edits ${{ github.event.inputs.max_edits }}"
          fi
          python mw_isbn_bot.py $ARGS
